<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Expense Calculator</h1>
        
        <div class="input-section">
            <h2>Add New Expense</h2>
            <form id="expense-form">
                <div class="form-group">
                    <label for="expense-name">Expense Name:</label>
                    <input type="text" id="expense-name" placeholder="e.g., Groceries" required>
                </div>
                
                <div class="form-group">
                    <label for="expense-amount">Amount ($):</label>
                    <input type="number" id="expense-amount" step="0.01" placeholder="0.00" required>
                </div>
                
                <div class="form-group">
                    <label for="expense-category">Category:</label>
                    <select id="expense-category">
                        <option value="Food">Food</option>
                        <option value="Transportation">Transportation</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Utilities">Utilities</option>
                        <option value="Healthcare">Healthcare</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <button type="submit" class="btn-add">Add Expense</button>
            </form>
        </div>
        
        <div class="summary-section">
            <h2>Summary</h2>
            <div class="total-display">
                <span>Total Expenses:</span>
                <span id="total-amount" class="total-amount">$0.00</span>
            </div>
        </div>
        
        <div class="expenses-section">
            <h2>Expense List</h2>
            <div id="expense-list" class="expense-list">
                <p class="no-expenses">No expenses added yet.</p>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
